<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="100%" height="100%">
  <defs>
    <!-- Vibrant Emerald to Teal Gradient for the primary loop -->
    <linearGradient id="Talkzen-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="Talkzen-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Emblem / Logo Mark -->
  <g transform="translate(10, 10)">
    <!-- Outer decorative link path -->
    <path d="M 20,40 C 20,25 35,20 45,30 C 55,40 45,55 35,50 C 25,45 20,40 20,40 Z" 
          fill="none" stroke="url(#Talkzen-grad)" stroke-width="4.5" stroke-linecap="round" filter="url(#Talkzen-glow)"/>
    <!-- Intersecting loop forming a connection (representing Talkzen link) -->
    <path d="M 40,20 C 50,15 60,25 55,35 C 50,45 35,40 40,20 Z" 
          fill="none" stroke="url(#Talkzen-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.85"/>
    
    <!-- Core glowing connection dot -->
    <circle cx="47" cy="27" r="4.5" fill="#34d399" filter="url(#Talkzen-glow)"/>
  </g>

  <!-- Logo Text "Talkzen" -->
  <text x="85" y="52" font-family="'Outfit', 'Inter', sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="1">
    Talkzen
  </text>
  
  <!-- Subtle tagline dot -->
  <circle cx="178" cy="48" r="4" fill="#34d399" />
</svg>
